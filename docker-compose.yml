services:
  database:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bcb_payslip
      POSTGRES_USER: bcb_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bcb_app -d bcb_payslip"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql+psycopg://bcb_app:${POSTGRES_PASSWORD}@database:5432/bcb_payslip
      PORTAL_DATA_DIR: /var/lib/bcb
      PAYSLIP_WORKER_MODE: external
      REQUIRE_POSTGRESQL: "true"
    volumes:
      - app_data:/var/lib/bcb
      - backup_data:/var/backups/bcb
    depends_on:
      database:
        condition: service_healthy
    expose:
      - "4190"

  worker:
    build: .
    restart: unless-stopped
    command: ["python", "worker.py"]
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql+psycopg://bcb_app:${POSTGRES_PASSWORD}@database:5432/bcb_payslip
      PORTAL_DATA_DIR: /var/lib/bcb
      PAYSLIP_WORKER_MODE: external
      REQUIRE_POSTGRESQL: "true"
      DISABLE_BACKUP_SCHEDULER: "true"
    volumes:
      - app_data:/var/lib/bcb
      - backup_data:/var/backups/bcb
    depends_on:
      database:
        condition: service_healthy

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      - app

volumes:
  postgres_data:
  app_data:
  backup_data:
