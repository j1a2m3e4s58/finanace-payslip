<!doctype html>
<html lang="en-GH">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#064e3b" />
    <title>BCB Finance — Offline</title>
    <style>
      *{box-sizing:border-box}body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:24px;background:linear-gradient(145deg,#043b2b,#076143);color:#f8faf7;font-family:Inter,system-ui,sans-serif}.card{width:min(420px,100%);border:1px solid rgba(226,184,58,.55);border-radius:24px;background:rgba(3,39,29,.82);padding:28px;text-align:center;box-shadow:0 28px 80px rgba(0,0,0,.35)}img{width:96px;height:96px;border-radius:22px;box-shadow:0 12px 35px rgba(0,0,0,.3)}h1{margin:20px 0 8px;font-family:Georgia,serif;font-size:26px}p{margin:0;color:#d7e5df;line-height:1.6;font-size:14px}button{min-height:48px;margin-top:22px;border:0;border-radius:12px;padding:0 22px;background:#d7a92d;color:#10251d;font-weight:800;cursor:pointer}.note{margin-top:18px;font-size:11px;color:#a9c4b9}
    </style>
  </head>
  <body>
    <main class="card">
      <img src="/icons/bcb-finance-192.png" alt="Bawjiase Community Bank" />
      <h1>Finance service is offline</h1>
      <p>Reconnect to the internet before signing in or working with confidential payroll information. No salary information is stored on this offline page.</p>
      <button type="button" onclick="location.reload()">Try Again</button>
      <p class="note">Bawjiase Community Bank · Leaders in Innovation</p>
    </main>
  </body>
</html>
