name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Frontend dependency security audit
        run: npm audit --audit-level=low

      - name: Build frontend
        run: npm run build

      - name: Install backend dependencies
        run: python -m pip install -r mail-api/requirements-dev.txt

      - name: Backend dependency security audit
        run: |
          python -m pip_audit -r mail-api/requirements.txt
          python -m pip_audit -r mail-api/requirements-dev.txt

      - name: Backend tests
        run: python -m pytest mail-api/tests -q

      - name: Synthetic 2,000-staff load gate
        run: npm run test:load

      - name: Python syntax
        run: python -m py_compile mail-api/app.py mail-api/storage.py mail-api/worker.py mail-api/wsgi.py mail-api/predeploy.py mail-api/production_config.py scripts/run-e2e-api.py scripts/run-e2e-smtp.py scripts/load-test.py scripts/postgres-recovery-drill.py scripts/check-production-config.py scripts/staging-smoke.py scripts/staging-payroll-delivery.py scripts/production-monitor.py

  production-services:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: bcb_payslip_test
          POSTGRES_USER: bcb_test
          POSTGRES_PASSWORD: bcb-test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bcb_test -d bcb_payslip_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -r mail-api/requirements-dev.txt
      - name: PostgreSQL and private SMTP integration gates
        env:
          TEST_POSTGRES_DATABASE_URL: postgresql+psycopg://bcb_test:bcb-test-password@127.0.0.1:5432/bcb_payslip_test
        run: python -m pytest mail-api/tests/test_service_integration.py -q

      - name: Encrypted PostgreSQL backup and restore drill
        env:
          TEST_POSTGRES_DATABASE_URL: postgresql+psycopg://bcb_test:bcb-test-password@127.0.0.1:5432/bcb_payslip_test
        run: python scripts/postgres-recovery-drill.py

      - name: PostgreSQL 2,000-staff load gate
        env:
          LOAD_TEST_DATABASE_URL: postgresql+psycopg://bcb_test:bcb-test-password@127.0.0.1:5432/bcb_payslip_test
        run: npm run test:load

  end-to-end:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: npm ci
      - run: python -m pip install -r mail-api/requirements-dev.txt
      - run: npx playwright install --with-deps chromium
      - name: Full payroll browser workflow
        run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 14
