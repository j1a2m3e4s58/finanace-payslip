name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Install backend dependencies
        run: python -m pip install -r mail-api/requirements.txt

      - name: Backend tests
        run: python -m pytest mail-api/tests -q

      - name: Python syntax
        run: python -m py_compile mail-api/app.py mail-api/storage.py mail-api/worker.py
