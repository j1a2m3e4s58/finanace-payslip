name: Approved Staging Security Scan

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type SCAN STAGING to authorize the protected staging target
        required: true

permissions:
  contents: read
  issues: write

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 15
    steps:
      - name: Verify explicit staging authorization
        if: ${{ inputs.confirmation != 'SCAN STAGING' }}
        run: exit 1
      - name: Validate the protected staging target
        env:
          TARGET_URL: ${{ secrets.STAGING_BASE_URL }}
        run: |
          python - <<'PY'
          import os
          from urllib.parse import urlparse
          url = os.environ['TARGET_URL'].strip()
          parsed = urlparse(url)
          if parsed.scheme != 'https' or not parsed.hostname or parsed.username or parsed.password:
              raise SystemExit('Only an approved HTTPS staging URL without embedded credentials is allowed')
          PY
      - uses: actions/checkout@v4
      - uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ secrets.STAGING_BASE_URL }}
          fail_action: true
          allow_issue_writing: true
          artifact_name: zap-staging-report
