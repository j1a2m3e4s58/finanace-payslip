name: Approved Staging Security Scan

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Approved HTTPS staging URL; never enter the production payroll URL
        required: true
        type: string

permissions:
  contents: read
  issues: write

jobs:
  validate-target:
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.target.outputs.approved }}
    steps:
      - id: target
        env:
          TARGET_URL: ${{ inputs.target_url }}
        run: |
          python - <<'PY'
          import os
          from urllib.parse import urlparse
          url = os.environ['TARGET_URL'].strip()
          parsed = urlparse(url)
          if parsed.scheme != 'https' or not parsed.hostname or parsed.username or parsed.password:
              raise SystemExit('Only an approved HTTPS staging URL without embedded credentials is allowed')
          if not any(marker in parsed.hostname.lower() for marker in ('staging', 'test', 'onrender.com')):
              raise SystemExit('Target host must clearly identify a staging/test environment')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write('approved=true\n')
          PY

  zap-baseline:
    needs: validate-target
    if: needs.validate-target.outputs.approved == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ inputs.target_url }}
          fail_action: true
          allow_issue_writing: true
          artifact_name: zap-staging-report
