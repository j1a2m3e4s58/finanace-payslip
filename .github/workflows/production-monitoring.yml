name: Production Monitoring

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: read
  issues: write

concurrency:
  group: bcb-production-monitoring
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - id: monitor
        name: Check production dependencies
        continue-on-error: true
        env:
          PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
          PRODUCTION_MONITORING_TOKEN: ${{ secrets.PRODUCTION_MONITORING_TOKEN }}
        run: python scripts/production-monitor.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: production-monitoring-report
          path: production-monitoring-report.json
          if-no-files-found: ignore
          retention-days: 30
      - name: Open or close the operational alert
        uses: actions/github-script@v7
        env:
          MONITOR_OUTCOME: ${{ steps.monitor.outcome }}
        with:
          script: |
            const title = '[Operations] Production monitoring requires attention';
            const { owner, repo } = context.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, { owner, repo, state: 'open', per_page: 100 });
            const existing = issues.find((issue) => issue.title === title && !issue.pull_request);
            if (process.env.MONITOR_OUTCOME === 'failure') {
              const body = `The protected production health check failed at ${new Date().toISOString()}. Review the workflow artifact and Render logs. No payroll or recipient data is included.`;
              if (existing) {
                await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
              } else {
                await github.rest.issues.create({ owner, repo, title, body });
              }
            } else if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body: 'Automated monitoring recovered and all protected checks passed.' });
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, state: 'closed' });
            }
      - name: Fail when monitoring requires attention
        if: steps.monitor.outcome == 'failure'
        run: exit 1
